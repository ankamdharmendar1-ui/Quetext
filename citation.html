<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citation Generator | APA, MLA, Chicago | VeriWrite</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .citation-box {
            background: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-premium);
            max-width: 800px;
            margin: 0 auto;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }
        .search-bar input {
            flex: 1;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }
        .style-selector {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 1px solid #eee;
        }
        .style-btn {
            padding: 12px 0;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .style-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                <span>VeriWrite</span>
            </a>
            <nav>
                <ul>
                    <li class="dropdown">
                        <a href="#" class="dropbtn">Tools <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></a>
                        <div class="dropdown-content">
                            <a href="index.html">Plagiarism Checker</a>
                            <a href="ai-detector.html">AI Detector</a>
                            <a href="humanizer.html">AI Humanizer</a>
                            <a href="summarizer.html">AI Summarizer</a>
                            <a href="citation.html">Citation Generator</a>
                        </div>
                    </li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="#tools" class="btn btn-primary">Generate Citation</a>
            </div>
        </div>
    </header>

    <main style="padding: 80px 0; background: var(--bg-secondary); min-height: calc(100vh - 80px);">
        <div class="container">
            <div class="section-title">
                <h1>Citation Generator</h1>
                <p>Generate accurate citations in seconds for any website, journal, or book.</p>
            </div>

            <div class="citation-box" id="tools">
                <div class="style-selector">
                    <div class="style-btn active">APA 7</div>
                    <div class="style-btn">MLA 9</div>
                    <div class="style-btn">Chicago</div>
                    <div class="style-btn">Harvard</div>
                </div>

                <div class="search-bar">
                    <input type="text" placeholder="Enter URL, DOI, or Title to search...">
                    <button class="btn btn-primary">Search</button>
                </div>

                <div style="text-align: center; color: var(--text-muted);">
                    <p>Or enter details manually</p>
                    <button class="btn btn-outline" style="margin-top: 16px;">Manual Citation</button>
                </div>
            </div>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; color: var(--text-muted); background: white; border-top: 1px solid #eee;">
        <div class="container">&copy; 2026 VeriWrite.</div>
    </footer>
</body>
</html>
